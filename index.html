<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F6EAD3">
<title>Café des Amis — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Marcellus+SC&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --paper:#F6EAD3;
    --paper-2:#EBD9B6;
    --card:#FFF9ED;
    --card-2:#FDF1DD;
    --ink:#2F241A;
    --muted:#7C674F;
    --line:rgba(96,70,45,.18);
    --accent:#A44F2D;
    --accent-2:#C9783A;
    --accent-soft:#F4DCC1;
    --success:#397D54;
    --shadow:0 18px 45px rgba(47,36,26,.13);
    --shadow-soft:0 10px 28px rgba(47,36,26,.08);
    --radius:26px;
    --maxw:780px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;scroll-padding-top:92px}
  body{
    min-height:100vh;
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    padding:0 18px 28px;
    background:
      radial-gradient(circle at top left, rgba(164,79,45,.18), transparent 34rem),
      radial-gradient(circle at 85% 8%, rgba(255,249,237,.78), transparent 22rem),
      linear-gradient(135deg,var(--paper) 0%,#F8EEDC 42%,var(--paper-2) 100%);
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.35;mix-blend-mode:multiply;
    background-image:linear-gradient(rgba(96,70,45,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(96,70,45,.045) 1px,transparent 1px);
    background-size:34px 34px;
  }
  a{color:inherit}
  .wrap{width:min(100%,var(--maxw));margin:0 auto;position:relative}

  /* ---------- Header / hero ---------- */
  .head{text-align:center;padding:20px 0 14px}
  .banner{
    position:relative;overflow:hidden;margin-top:8px;padding:28px 24px 20px;border-radius:34px;
    background:linear-gradient(145deg,rgba(255,249,237,.96),rgba(242,222,190,.92));
    border:1px solid rgba(255,255,255,.64);box-shadow:var(--shadow);
  }
  .banner::before,.banner::after{content:"";position:absolute;border-radius:999px;pointer-events:none}
  .banner::before{width:260px;height:260px;left:-95px;top:-125px;background:rgba(164,79,45,.12)}
  .banner::after{width:180px;height:180px;right:-70px;bottom:-90px;background:rgba(255,255,255,.55)}
  .logo{position:relative;z-index:1;display:block;margin:0 auto;width:min(370px,84%);height:auto;filter:drop-shadow(0 15px 22px rgba(47,36,26,.18))}
  .status{
    display:inline-flex;align-items:center;gap:9px;margin-top:15px;
    padding:8px 15px;border-radius:999px;font-size:13px;font-weight:700;
    color:var(--muted);border:1px solid var(--line);background:rgba(255,249,237,.78);
    box-shadow:var(--shadow-soft);backdrop-filter:blur(10px);
  }
  .status .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);box-shadow:0 0 0 5px rgba(124,103,79,.10)}
  .status.open{color:var(--success);border-color:rgba(57,125,84,.25);background:rgba(235,247,238,.86)}
  .status.open .dot{background:var(--success);box-shadow:0 0 0 5px rgba(57,125,84,.13)}

  /* ---------- Intro ---------- */
  .intro{
    display:grid;grid-template-columns:1fr;gap:14px;margin:16px 0 18px;padding:20px;
    border-radius:var(--radius);background:rgba(255,249,237,.72);border:1px solid rgba(255,255,255,.62);
    box-shadow:var(--shadow-soft);backdrop-filter:blur(12px);
  }
  .eyebrow{font-family:"Marcellus SC",serif;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-size:12px;margin-bottom:3px}
  .intro h1{font-family:"Marcellus",Georgia,serif;font-weight:400;font-size:clamp(30px,7vw,48px);line-height:1.02;letter-spacing:.01em}
  .intro p{color:var(--muted);font-size:15px;margin-top:8px;max-width:54ch}
  .quick-actions{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-top:3px}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;padding:10px 16px;border-radius:999px;
    text-decoration:none;font-weight:800;font-size:13.5px;border:1px solid transparent;transition:transform .18s ease,box-shadow .18s ease,background .18s ease;
  }
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 10px 22px rgba(164,79,45,.22)}
  .btn.ghost{background:rgba(255,255,255,.54);border-color:var(--line);color:var(--ink)}
  .btn:hover,.btn:focus-visible{transform:translateY(-2px);outline:none;box-shadow:0 14px 28px rgba(47,36,26,.14)}

  /* ---------- Category nav ---------- */
  .nav{
    position:sticky;top:12px;z-index:5;display:flex;gap:8px;justify-content:flex-start;overflow:auto;
    padding:10px;margin:10px -4px 8px;border:1px solid rgba(255,255,255,.58);border-radius:999px;
    background:rgba(255,249,237,.72);box-shadow:var(--shadow-soft);backdrop-filter:blur(14px);scrollbar-width:none;
  }
  .nav::-webkit-scrollbar{display:none}
  .nav a{
    flex:0 0 auto;font-family:"Marcellus SC",serif;font-size:13px;letter-spacing:.06em;
    color:var(--ink);text-decoration:none;padding:9px 15px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.58);
    transition:background .18s ease,color .18s ease,border-color .18s ease,transform .18s ease;
  }
  .nav a:hover,.nav a:focus-visible{background:var(--ink);color:var(--card);border-color:var(--ink);outline:none;transform:translateY(-1px)}

  /* ---------- Sections ---------- */
  .section{margin:20px 0;padding:22px;border-radius:var(--radius);background:rgba(255,249,237,.78);border:1px solid rgba(255,255,255,.62);box-shadow:var(--shadow-soft)}
  .section-head{display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .section-head h2{font-family:"Marcellus",Georgia,serif;font-weight:400;font-size:clamp(25px,5.5vw,34px);letter-spacing:.01em;white-space:nowrap}
  .section-head .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .section-head .count{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;border:1px solid var(--line);border-radius:999px;padding:3px 9px;background:rgba(255,255,255,.48)}
  .reveal{animation:rise .55s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* ---------- Items ---------- */
  .item{position:relative;padding:15px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none;padding-bottom:2px}
  .item-top{display:flex;align-items:baseline;gap:10px}
  .item-name{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .leader{flex:1;border-bottom:1px dotted rgba(96,70,45,.28);transform:translateY(-4px);min-width:18px}
  .item-price{font-size:15.5px;font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}
  .item-desc{font-size:13.7px;color:var(--muted);margin-top:5px;max-width:54ch}
  .allergens{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .allergen{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 8px;background:rgba(255,255,255,.54)}
  .item.sold{opacity:.62}
  .item.sold .item-name,.item.sold .item-price{color:var(--muted)}
  .item.sold .item-name{text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:rgba(164,79,45,.28)}
  .sold-tag{display:inline-flex;margin-left:8px;transform:translateY(-1px);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:900;border:1px solid rgba(164,79,45,.22);border-radius:999px;padding:2px 7px;background:rgba(244,220,193,.55)}

  /* ---------- Footer ---------- */
  .foot{margin:26px 0 50px;padding:22px;border-radius:var(--radius);background:rgba(47,36,26,.92);color:var(--card);box-shadow:var(--shadow);overflow:hidden;position:relative}
  .foot::before{content:"";position:absolute;inset:auto -80px -120px auto;width:220px;height:220px;border-radius:50%;background:rgba(201,120,58,.20)}
  .owners{position:relative;display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,249,237,.16)}
  .owners img{width:72px;height:72px;object-fit:cover;border-radius:22px;border:2px solid rgba(255,249,237,.45);box-shadow:0 12px 24px rgba(0,0,0,.18)}
  .who{display:flex;flex-direction:column;gap:2px}.who b{font-family:"Marcellus",Georgia,serif;font-size:22px;font-weight:400}.who span{color:rgba(255,249,237,.68);font-size:13.5px}
  .foot h3{font-family:"Marcellus",Georgia,serif;font-weight:400;font-size:28px;margin-bottom:8px}
  .hours{width:100%;border-collapse:collapse;margin-top:8px;font-size:14px;position:relative}.hours td{padding:9px 0;border-bottom:1px solid rgba(255,249,237,.13)}
  .hours tr:last-child td{border-bottom:none}.day{color:rgba(255,249,237,.72)}.time{text-align:right;font-weight:800}.today .day,.today .time{color:#fff}.closed{color:rgba(255,249,237,.48);font-weight:700;text-transform:lowercase}
  .contacts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;position:relative}.contacts>div{padding:13px;border-radius:18px;background:rgba(255,249,237,.08);border:1px solid rgba(255,249,237,.12);font-size:13.5px}.contacts a{text-decoration:none;color:#fff;font-weight:800}.lab{display:block;color:rgba(255,249,237,.56);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
  .mock-note{margin:0 auto 42px;width:fit-content;max-width:100%;padding:9px 13px;border-radius:999px;background:rgba(47,36,26,.08);border:1px dashed var(--line);color:var(--muted);font-size:12px;text-align:center}
  .loading{margin:22px 0;padding:22px;border-radius:var(--radius);background:rgba(255,249,237,.7);border:1px solid rgba(255,255,255,.65);color:var(--muted);text-align:center;box-shadow:var(--shadow-soft)}

  @media (min-width:720px){
    body{padding-inline:26px}.head{padding-top:26px}.intro{grid-template-columns:1.25fr .75fr;align-items:end;padding:24px}.quick-actions{justify-content:flex-end}.section{padding:26px 28px}.nav{justify-content:center}
  }
  @media (max-width:560px){
    .banner{border-radius:28px;padding:22px 14px 16px}.status{font-size:12.5px}.section{padding:18px}.leader{display:none}.item-top{align-items:flex-start;justify-content:space-between}.item-name{padding-right:10px}.contacts{grid-template-columns:1fr}.owners img{width:64px;height:64px}.nav{top:8px;border-radius:24px}.nav a{padding:8px 13px}
  }
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}.reveal,.btn,.nav a{animation:none;transition:none}}

</style>
</head>

function parseCSV(text){
  const rows=[];let row=[],field="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else q=false;}else field+=c;}
    else{if(c==='"')q=true;else if(c===',')(row.push(field),field="");
      else if(c==='\n')(row.push(field),rows.push(row),row=[],field="");
      else if(c==='\r'){}else field+=c;}}
  if(field.length||row.length){row.push(field);rows.push(row);}return rows;
}
function csvToObjects(text){
  const rows=parseCSV(text).filter(r=>r.some(c=>c.trim()!==""));if(!rows.length)return[];
  const head=rows[0].map(h=>h.trim());
  return rows.slice(1).map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||"").trim());return o;});
}
async function loadTab(tab,fallback){
  if(!SHEET_ID)return fallback;
  try{const res=await fetch(csvUrl(tab));if(!res.ok)throw 0;return csvToObjects(await res.text());}
  catch(e){console.warn("Tab "+tab+" non leggibile, uso esempio.");return fallback;}
}
const DAYS=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
const toMin=t=>{const m=/(\d{1,2}):(\d{2})/.exec(t||"");return m?(+m[1])*60+(+m[2]):null;};
function openState(orari){
  const now=new Date(),today=DAYS[now.getDay()];
  const row=orari.find(r=>(r.Giorno||"").toLowerCase()===today.toLowerCase());
  if(!row)return{open:false,today};
  const o=toMin(row.Apertura),c=toMin(row.Chiusura);if(o===null||c===null)return{open:false,today};
  const cur=now.getHours()*60+now.getMinutes();
  return{open:c>o?(cur>=o&&cur<c):(cur>=o||cur<c),today};
}
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,"-");
const price=p=>{p=(p||"").trim();return!p?"":(/€/.test(p)?p:"€ "+p);};
const isAvailable=v=>!/^(no|false|0|n)$/i.test((v||"").trim());
const infoGet=(info,k)=>{const r=info.find(x=>(x.Campo||"").toLowerCase()===k.toLowerCase());return r?r.Valore:"";};

function render({menu,orari,info}){
  const name=infoGet(info,"Nome")||"Café des Amis";
  const sub=infoGet(info,"Sottotitolo"),tel=infoGet(info,"Telefono"),addr=infoGet(info,"Indirizzo"),ig=infoGet(info,"Instagram");
  const st=openState(orari);
  document.getElementById("status").innerHTML=
    `<div class="status ${st.open?"open":""}" aria-label="Stato apertura"><span class="dot"></span>${st.open?"Aperto ora":"Chiuso ora"}</div>`;

  const cats=[];menu.forEach(i=>{if(i.Categoria&&!cats.includes(i.Categoria))cats.push(i.Categoria);});
  const nav=cats.map(c=>`<a href="#${slug(c)}">${esc(c)}</a>`).join("");
  const sections=cats.map(c=>{
    const items=menu.filter(i=>i.Categoria===c);
    const rows=items.map(i=>{
      const av=isAvailable(i.Disponibile);
      const all=(i.Allergeni||"").split(",").map(a=>a.trim()).filter(Boolean);
      return `<div class="item${av?"":" sold"}">
        <div class="item-top">
          <span class="item-name">${esc(i.Nome)}${av?"":'<span class="sold-tag">esaurito</span>'}</span>
          <span class="leader" aria-hidden="true"></span><span class="item-price">${esc(price(i.Prezzo))}</span>
        </div>
        ${i.Descrizione?`<div class="item-desc">${esc(i.Descrizione)}</div>`:""}
        ${all.length?`<div class="allergens" aria-label="Allergeni">${all.map(a=>`<span class="allergen">${esc(a)}</span>`).join("")}</div>`:""}
      </div>`;}).join("");
    return `<section class="section reveal" id="${slug(c)}">
      <div class="section-head"><h2>${esc(c)}</h2><span class="rule" aria-hidden="true"></span><span class="count">${items.length}</span></div>
      ${rows}</section>`;}).join("");
  const hoursRows=orari.map(r=>{
    const closed=!toMin(r.Apertura)&&!toMin(r.Chiusura);
    const today=(r.Giorno||"").toLowerCase()===st.today.toLowerCase();
    const t=closed?`<span class="closed">chiuso</span>`:`${esc(r.Apertura)} – ${esc(r.Chiusura)}`;
    return `<tr class="${today?"today":""}"><td class="day">${esc(r.Giorno)}</td><td class="time">${t}</td></tr>`;}).join("");
  const contacts=[
    addr?`<div><span class="lab">Dove</span>${esc(addr)}</div>`:"",
    tel?`<div><span class="lab">Telefono</span><a href="tel:${esc(tel.replace(/\s/g,""))}">${esc(tel)}</a></div>`:"",
    ig?`<div><span class="lab">Instagram</span><a href="https://instagram.com/${esc(ig.replace(/^@/,""))}" target="_blank" rel="noopener">${esc(ig)}</a></div>`:"",
  ].filter(Boolean).join("");
  const telBtn=tel?`<a class="btn primary" href="tel:${esc(tel.replace(/\s/g,""))}">Chiama ora</a>`:"";
  const igBtn=ig?`<a class="btn ghost" href="https://instagram.com/${esc(ig.replace(/^@/,""))}" target="_blank" rel="noopener">Instagram</a>`:"";

  document.getElementById("app").innerHTML=`
    <nav class="nav" aria-label="Categorie menu">${nav}</nav>
    <section class="intro reveal" aria-label="Introduzione">
      <div>
        <div class="eyebrow">Menu digitale</div>
        <h1>${esc(name)}</h1>
        ${sub?`<p>${esc(sub)}. Sfoglia categorie, prezzi e disponibilità in un layout più leggibile e moderno.</p>`:""}
      </div>
      ${(telBtn||igBtn)?`<div class="quick-actions">${telBtn}${igBtn}</div>`:""}
    </section>
    ${sections}
    <footer class="foot">
      <div class="owners"><img src="${OWNERS_IMG}" alt="Le titolari del Café des Amis"><div class="who"><b>Le titolari</b><span>Vi aspettano al bar</span></div></div>
      <h3>Orari</h3>
      <table class="hours">${hoursRows}</table>
      ${contacts?`<div class="contacts">${contacts}</div>`:""}
    </footer>
    ${!SHEET_ID?`<div class="mock-note">Anteprima con dati di esempio · collegando il Google Sheet i contenuti si aggiornano da soli</div>`:""}`;
  document.querySelectorAll(".reveal").forEach((s,i)=>s.style.animationDelay=(i*70)+"ms");
}
(async function(){
  const [menu,orari,info]=await Promise.all([
    loadTab(TABS.menu,SAMPLE.menu),loadTab(TABS.orari,SAMPLE.orari),loadTab(TABS.info,SAMPLE.info)]);
  render({menu,orari,info});
})();
</script>
